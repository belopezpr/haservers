global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 4096

defaults
    log     global
    mode    tcp             # Crítico: Modo TCP obligatorio para bases de datos
    timeout connect 5s      # Tiempo máximo para conectar al backend
    timeout client  30m     # Tiempo para mantener conexiones inactivas del cliente
    timeout server  30m     # Tiempo para mantener conexiones inactivas del servidor
    retries 3

# ==========================================
# SECCIÓN POSTGRESQL
# ==========================================
frontend postgres_front
    bind *:5432             # Puerto público donde escuchará HAProxy para Postgres
    default_backend postgres_back

backend postgres_back
    balance roundrobin      # Algoritmo de balanceo
    option tcp-check        # Comprobación de salud básica a nivel TCP
    # Reemplaza las IPs con las de tus servidores reales
    server pg_node1 192.168.1.50:5432 check inter 3s fall 3 rise 2
    server pg_node2 192.168.1.51:5432 check inter 3s fall 3 rise 2

# ==========================================
# SECCIÓN MYSQL / MARIADB
# ==========================================
frontend mysql_front
    bind *:3306             # Puerto público donde escuchará HAProxy para MySQL
    default_backend mysql_back

backend mysql_back
    balance leastconn       # Recomendado para MySQL (asigna conexiones al nodo menos cargado)
    option mysql-check user haproxy_check # Comprobación de salud nativa de MySQL
    # Reemplaza las IPs con las de tus servidores reales
    server mysql_node1 192.168.1.60:3306 check inter 3s fall 3 rise 2
    server mysql_node2 192.168.1.61:3306 check inter 3s fall 3 rise 2

# ==========================================
# PANEL DE ESTADÍSTICAS (OPCIONAL)
# ==========================================
listen stats
    mode http               # El panel visual sí requiere modo HTTP
    bind *:8080
    stats enable
    stats uri /
    stats refresh 5s
